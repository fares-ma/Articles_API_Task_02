name: .NET CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Articles_API_Task_01.sln

      - name: Build
        run: dotnet build Articles_API_Task_01.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Articles_API_Task_01.sln --configuration Release --no-build --verbosity normal
